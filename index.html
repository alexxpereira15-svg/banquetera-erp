<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banquetera360 - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .sidebar-item.active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0 shadow-xl">
            <div class="p-6 text-2xl font-bold border-b border-slate-700">
                Banquetera<span class="text-blue-400">360</span>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="showPage('dashboard')" class="sidebar-item w-full text-left p-3 hover:bg-slate-800 rounded-lg transition flex items-center"><i class="fas fa-home w-6"></i> Dashboard</button>
                <button onclick="showPage('agenda')" class="sidebar-item w-full text-left p-3 hover:bg-slate-800 rounded-lg transition flex items-center"><i class="fas fa-calendar-alt w-6"></i> Agenda</button>
                <button onclick="showPage('cotizaciones')" class="sidebar-item w-full text-left p-3 hover:bg-slate-800 rounded-lg transition flex items-center"><i class="fas fa-file-invoice-dollar w-6"></i> Cotizaciones</button>
                <button onclick="showPage('inventario')" class="sidebar-item w-full text-left p-3 hover:bg-slate-800 rounded-lg transition flex items-center"><i class="fas fa-utensils w-6"></i> Inventario</button>
            </nav>
            <div class="p-4 bg-slate-800 text-xs text-center text-slate-400">Mérida, Yucatán</div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-md p-4 flex justify-between items-center z-10">
                <h1 id="page-title" class="text-xl font-bold text-slate-800 uppercase tracking-wider">Dashboard</h1>
                <span id="save-status" class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">Sistema Listo</span>
            </header>

            <div class="p-6 overflow-y-auto flex-1">
                <div id="dashboard" class="page active">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                            <p class="text-slate-400 text-xs font-bold uppercase">Ingresos Estimados</p>
                            <p class="text-2xl font-black text-slate-800">$185,000</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                            <p class="text-slate-400 text-xs font-bold uppercase">Eventos en Agenda</p>
                            <p id="count-eventos" class="text-2xl font-black text-slate-800">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-500">
                            <p class="text-slate-400 text-xs font-bold uppercase">Ubicación</p>
                            <p class="text-2xl font-black text-slate-800">Mérida</p>
                        </div>
                    </div>
                </div>

                <div id="agenda" class="page">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                        <h2 class="text-lg font-bold mb-4">Nuevo Evento</h2>
                        <form id="event-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input type="text" id="ev-cliente" placeholder="Nombre del Cliente" class="p-2 border rounded">
                            <input type="date" id="ev-fecha" class="p-2 border rounded">
                            <input type="text" id="ev-lugar" placeholder="Lugar (Hacienda, Salón...)" class="p-2 border rounded">
                            <button type="button" onclick="saveEvent()" class="bg-blue-600 text-white font-bold p-2 rounded col-span-full hover:bg-blue-700">GUARDAR EN GOOGLE SHEETS</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                                <tr><th class="p-4">Cliente</th><th class="p-4">Fecha</th><th class="p-4">Lugar</th></tr>
                            </thead>
                            <tbody id="agenda-table-body" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>

                <div id="cotizaciones" class="page">
                    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md mx-auto border">
                        <h2 class="text-xl font-bold mb-4 text-center">Calculadora de Evento</h2>
                        <div class="space-y-4">
                            <input type="number" id="cot-pax" placeholder="Número de personas" class="w-full p-2 border rounded">
                            <input type="number" id="cot-precio" placeholder="Precio por platillo" class="w-full p-2 border rounded">
                            <div class="bg-blue-900 text-white p-4 rounded text-center">
                                <p class="text-xs uppercase opacity-70">Total Estimado</p>
                                <p id="cot-res" class="text-3xl font-black">$0.00</p>
                            </div>
                            <button onclick="document.getElementById('cot-res').innerText = '$' + (document.getElementById('cot-pax').value * document.getElementById('cot-precio').value).toLocaleString()" class="w-full bg-green-600 text-white p-2 rounded font-bold">CALCULAR</button>
                        </div>
                    </div>
                </div>

                <div id="inventario" class="page">
                    <div class="bg-white p-6 rounded-xl shadow-sm">
                        <p class="text-slate-500 italic">Módulo de inventario conectado próximamente...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- PEGA TU URL AQUÍ ABAJO ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0bOMv0gvrHyqPv7fqYOZtipvnK_ZrYjedSOhMUV-KXpfdQjSo6EQ4NXwQLh44ny0y/exec"; 

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('page-title').innerText = pageId;
        }

        async function renderAgenda() {
            const table = document.getElementById('agenda-table-body');
            table.innerHTML = '<tr><td colspan="3" class="p-4 text-center animate-pulse text-blue-600 font-bold">Cargando datos de Google Sheets...</td></tr>';
            try {
                const response = await fetch(SCRIPT_URL);
                const eventos = await response.json();
                document.getElementById('count-eventos').innerText = eventos.length;
                table.innerHTML = eventos.map(ev => `
                    <tr class="border-b hover:bg-blue-50">
                        <td class="p-4 font-bold text-slate-700">${ev.cliente}</td>
                        <td class="p-4">${ev.fecha}</td>
                        <td class="p-4 text-slate-500">${ev.lugar}</td>
                    </tr>
                `).join('');
            } catch (e) {
                table.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-red-500">Error al conectar con la base de datos</td></tr>';
            }
        }

        async function saveEvent() {
            const cliente = document.getElementById('ev-cliente').value;
            const fecha = document.getElementById('ev-fecha').value;
            const lugar = document.getElementById('ev-lugar').value;
            if(!cliente || !fecha) return alert('Cliente y Fecha son obligatorios');

            const status = document.getElementById('save-status');
            status.innerText = "Guardando en la Nube...";
            status.classList.replace('text-green-600', 'text-orange-600');

            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ cliente, fecha, lugar })
            });

            document.getElementById('event-form').reset();
            await renderAgenda();
            status.innerText = "¡Sincronizado!";
            status.classList.replace('text-orange-600', 'text-green-600');
            setTimeout(() => status.innerText = "Sistema Listo", 2000);
        }

        renderAgenda();
    </script>
</body>
</html>
